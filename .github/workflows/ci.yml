name: CI/CD Docker Compose TPA

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/flask-api:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask-api:latest

      - name: Lancer containers
        run: docker compose up -d

      - name: Test API Flask
        run: |
          sleep 10
          curl -f http://localhost:5000/api/users

      - name: Arrêter containers
        run: docker compose down